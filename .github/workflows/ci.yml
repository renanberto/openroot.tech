name: OpenRoot OS CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release candidate check
        run: npm run rc:check
